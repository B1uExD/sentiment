# TYPE  DATABASE        USER            ADDRESS                 METHOD
# Allow the local container itself
local   all             all                                     trust

# Allow connections from any internal Docker network (e.g., 172.16.0.0/12 range)
# using the secure SCRAM-SHA-256 method.
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256
