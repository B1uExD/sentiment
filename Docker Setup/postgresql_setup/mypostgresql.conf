# --- Connectivity ---
# Listen on all internal container interfaces for Docker network traffic
listen_addresses = '*' # Better to provide port number instead of *
port = 5432
max_connections = 4 # max number of connections accepted

# --- Authentication Hardening ---
# Force modern, cryptographically strong password hashing
password_encryption = scram-sha-256

# --- Security & Resource Limits ---
ssl = off                           # Disabled per your requirement for internal-only use
row_level_security = on             # Extra layer of security for multi-tenant data
shared_buffers = 256MB              # Standard for 1GB container limit
work_mem = 4MB
#maintenance_work_mem = 64MB

# --- Detailed Auditing (Critical for Hardening) ---
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# Track who is connecting from where in the Docker network
log_connections = on
log_disconnections = on
log_hostname = on

# Log schema changes (DDL) to catch unauthorized modifications
log_statement = 'ddl'
log_min_duration_statement = 500    # Log any internal query taking > 500ms

# --- Error & Crash Recovery ---
exit_on_error = off
restart_after_crash = on

# --- Connection Timeouts ---
# Terminate sessions that are idle (not in a transaction) for 10 minutes
idle_session_timeout = '10min'

# Terminate sessions that are idle while inside an open transaction for 10 minutes
# This is critical for preventing "orphaned" locks that can freeze your DB
idle_in_transaction_session_timeout = '10min'

# Abort any statement that takes more than 30 minutes to complete (Safety Valve)
statement_timeout = '30min'


# --- SSL Configuration ---
# You must generate server.crt and server.key in your ./certs folder
